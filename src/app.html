<!doctype html>
<html lang="en" %sveltekit.theme%>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="G+4 Standalone Office for Lease at Kondapur Main Road — 600 plug-and-play seats, 50+ rooms, rooftop cafeteria, 3-level parking." />
    <!-- analytics slot: add Plausible/Umami script here when ready -->
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const dark = saved ? saved === 'dark' : prefersDark;
          if (dark) document.documentElement.classList.add('dark');
        } catch {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
